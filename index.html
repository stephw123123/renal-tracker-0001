<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的健康日誌</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f4f7f9; padding: 15px; margin: 0; color: #2c3e50; }
        .card { background: white; border-radius: 15px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        h2 { border-bottom: 2px solid #3498db; padding-bottom: 5px; margin-top: 0; font-size: 1.1rem; }
        .welcome-msg { color: #3498db; font-weight: bold; margin-bottom: 5px; font-size: 1.1rem; text-align: center; }
        .summary-msg { background: #e3f2fd; padding: 12px; border-radius: 10px; font-size: 0.95rem; margin-bottom: 20px; border-left: 4px solid #2196f3; color: #0d47a1; }
        
        /* Navigation Tabs */
        .tabs { display: flex; margin-bottom: 15px; border-radius: 10px; overflow: hidden; border: 1px solid #ddd; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: #eee; cursor: pointer; font-weight: bold; }
        .tab-btn.active { background: #3498db; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Calendar Styling */
        .calendar-legend { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 0.7rem; margin-bottom: 15px; background: #fcfcfc; padding: 10px; border-radius: 8px; }
        .legend-item { display: flex; align-items: center; gap: 5px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; }
        .cal-month-header { text-align: center; font-weight: bold; padding: 10px; background: #3498db; color: white; border-radius: 8px; margin: 20px 0 10px; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .cal-day { font-size: 0.65rem; padding: 4px 2px; border-radius: 5px; background: #fff; border: 1px solid #eee; min-height: 85px; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .cal-header { font-weight: bold; background: #f1f2f6 !important; min-height: 25px !important; }
        .cal-dot { width: 18px; height: 18px; border-radius: 50%; margin: 3px 0; border: 1px solid rgba(0,0,0,0.1); }
        .cal-note { font-size: 0.55rem; color: #666; line-height: 1.1; }

        /* PDF Button Pinned */
        .pdf-action-bar { display: none; margin-bottom: 15px; }
        .tab-content.active .pdf-action-bar { display: block; }

        /* Inputs & Misc */
        input, select { padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
        button { background: #3498db; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }
        .progress-container { background: #eee; border-radius: 20px; height: 20px; width: 100%; margin: 10px 0; overflow: hidden; }
        #progressBar { background: #3498db; height: 100%; width: 0%; transition: width 0.5s ease; }
        .details-box { display: none; background: #f9f9f9; padding: 10px; border-radius: 8px; margin-top: 5px; font-size: 0.8rem; text-align: left; border: 1px solid #ddd; }
        #pinOverlay { position: fixed; inset: 0; background: #2c3e50; display: flex; justify-content: center; align-items: center; z-index: 1000; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.85rem; text-align: center; }
        th, td { padding: 10px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<div id="pinOverlay">
    <div class="card" style="width: 280px; text-align: center;">
        <h3>我的健康日誌 - 解鎖 📝🔓</h3>
        <input type="password" id="pinInput" maxlength="4" placeholder="輸入 PIN" inputmode="numeric" style="text-align:center; font-size: 20px;">
    </div>
</div>

<div id="mainApp" style="display:none;">
    <div class="welcome-msg">歡迎登錄你的健康日誌！</div>
    <div id="yesterdaySummary" class="summary-msg">正在分析昨日進度...</div>

    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('tracker', this)">今日記錄</button>
        <button class="tab-btn" onclick="showTab('history', this)">歷史詳情</button>
        <button class="tab-btn" onclick="showTab('calendarTab', this)">回顧月曆</button>
    </div>

    <!-- Tracker Tab -->
    <div id="tracker" class="tab-content active">
        <div class="card">
            <h2>🥗 自動飲食分析</h2>
            <input type="text" id="foodName" placeholder="輸入食物 (如：牛肉)">
            <button onclick="addFood()" style="background:#f39c12;">紀錄並分析</button>
            <div id="dailyFoodList"></div>
        </div>
        <div class="card">
            <h2>💧 飲水進度 (<span id="curTotal">0</span>/800mL)</h2>
            <div class="progress-container"><div id="progressBar"></div></div>
            <div style="display:flex; gap:5px;">
                <input type="number" id="fluidAmt" placeholder="mL" style="width:150px;">
                <select id="fluidType" style="flex-grow:1;"><option value="水">水</option><option value="其他">其他</option></select>
            </div>
            <button onclick="addFluid()">新增記錄</button>
        </div>
    </div>

    <!-- History Table Tab -->
    <div id="history" class="tab-content">
        <div class="pdf-action-bar">
            <button onclick="exportToPDF()" style="background:#2980b9;">下載為 PDF (以便分享給你的臨床心理學家)</button>
        </div>
        <div class="card">
            <h2>📋 每日詳情 (點擊日期查看)</h2>
            <table id="historyTable">
                <thead><tr><th>日期</th><th>藥物</th><th>飲水</th><th>飲食</th></tr></thead>
                <tbody id="historyBody"></tbody>
            </table>
        </div>
    </div>

    <!-- Calendar View Tab -->
    <div id="calendarTab" class="tab-content">
        <div class="pdf-action-bar">
            <button onclick="exportToPDF()" style="background:#2980b9;">下載為 PDF (以便分享給你的臨床心理學家)</button>
        </div>
        <div class="card">
            <div class="calendar-legend">
                <div class="legend-item"><span class="dot" style="background:green;"></span> 3/3成功</div>
                <div class="legend-item"><span class="dot" style="background:darkorange;"></span> 2/3成功</div>
                <div class="legend-item"><span class="dot" style="background:darkred;"></span> 1/3成功</div>
                <div class="legend-item"><span class="dot" style="background:black;"></span> 0/3成功</div>
            </div>
            <div id="multiMonthCalendarContainer"></div>
        </div>
    </div>

    <button onclick="location.reload()" style="background:#34495e; margin:20px 0 40px;">登出</button>
</div>

<script>
    const CONFIG = { LIMIT: 800, PIN: "1234" };

    function calculateDayScore(dateStr) {
        const fLogs = JSON.parse(localStorage.getItem('f_logs') || '[]').filter(l => l.date === dateStr);
        const dLogs = JSON.parse(localStorage.getItem('d_logs') || '[]').filter(l => l.date === dateStr);
        const mLogs = JSON.parse(localStorage.getItem('m_list') || '[]').filter(l => l.date === dateStr);
        const fSum = fLogs.reduce((s, l) => s + l.amt, 0);
        const fOk = fSum >= 700 && fSum <= 800;
        const dOk = dLogs.length > 0 && !dLogs.some(l => l.risk);
        const mTaken = mLogs.map(l => l.timeSlot);
        const mOk = ["08:00", "12:00", "20:00", "22:00"].every(t => mTaken.includes(t));

        let score = 0;
        let reasons = [];
        const hasData = fLogs.length > 0 || dLogs.length > 0 || mLogs.length > 0;
        if (!hasData) return { hasData: false };

        if (mOk) score++; else reasons.push("藥物未齊");
        if (fOk) score++; else reasons.push(fSum > 800 ? "水分超標" : "水分不足");
        if (dOk) score++; else reasons.push("注意飲食");

        let color = "black";
        if (score === 3) color = "green";
        else if (score === 2) color = "darkorange";
        else if (score === 1) color = "darkred";

        return { score, color, reasons, hasData: true, fLogs, dLogs, mLogs, fOk, dOk, mOk, fSum };
    }

    function renderMultiMonthCalendar() {
        const container = document.getElementById('multiMonthCalendarContainer');
        container.innerHTML = '';
        const fLogs = JSON.parse(localStorage.getItem('f_logs') || '[]');
        const mLogs = JSON.parse(localStorage.getItem('m_list') || '[]');
        const dLogs = JSON.parse(localStorage.getItem('d_logs') || '[]');
        const allDates = [...new Set([...fLogs, ...mLogs, ...dLogs].map(l => l.date))];
        
        const monthYears = [...new Set(allDates.map(d => {
            const dt = new Date(d);
            return `${dt.getFullYear()}/${dt.getMonth()}`;
        }))].sort((a,b) => {
            const [y1, m1] = a.split('/').map(Number);
            const [y2, m2] = b.split('/').map(Number);
            return y2 !== y1 ? y2 - y1 : m2 - m1;
        });

        if (monthYears.length === 0) {
            const dt = new Date();
            monthYears.push(`${dt.getFullYear()}/${dt.getMonth()}`);
        }

        monthYears.forEach(my => {
            const [year, month] = my.split('/').map(Number);
            const grid = document.createElement('div');
            grid.className = 'cal-grid';
            const header = document.createElement('div');
            header.className = 'cal-month-header';
            header.innerText = `${year}年 ${month + 1}月`;
            container.appendChild(header);
            container.appendChild(grid);

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            ["日","一","二","三","四","五","六"].forEach(w => grid.innerHTML += `<div class="cal-day cal-header">${w}</div>`);
            for(let i=0; i<firstDay; i++) grid.innerHTML += `<div class="cal-day" style="background:#f9f9f9"></div>`;
            for(let day=1; day<=daysInMonth; day++) {
                const dateStr = new Date(year, month, day).toLocaleDateString();
                const s = calculateDayScore(dateStr);
                let noteHtml = s.hasData ? (s.score === 3 ? '<div class="cal-note" style="color:green">完成晒！</div>' : s.reasons.map(r => `<div class="cal-note">${r}</div>`).join('')) : '';
                grid.innerHTML += `<div class="cal-day"><div>${day}</div>${s.hasData ? `<div class="cal-dot" style="background:${s.color}"></div>` : ''}${noteHtml}</div>`;
            }
        });
    }

    function exportToPDF() {
        const fLogs = JSON.parse(localStorage.getItem('f_logs') || '[]');
        const allDates = [...new Set(fLogs.map(x=>x.date))].sort((a,b)=>new Date(a)-new Date(b));
        const range = allDates.length > 0 ? `${allDates[0]} 至 ${allDates[allDates.length-1]}` : new Date().toLocaleDateString();
        
        const win = window.open('', '', 'height=800,width=900');
        win.document.write(`<html><head><title>健康報告</title><style>
            body { font-family: sans-serif; padding: 30px; line-height:1.5; }
            h1, h2 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 5px; }
            table { width: 100%; border-collapse: collapse; margin-top: 10px; margin-bottom: 20px;}
            th, td { border: 1px solid #ddd; padding: 10px; text-align: left; font-size: 0.9rem; }
            .day-block { margin-bottom: 40px; page-break-inside: avoid; }
        </style></head><body>
            <h1>腎臟健康進度報告</h1>
            <p><strong>報告期間:</strong> ${range}</p>
            <h2>1. 指標摘要</h2>
            ${document.getElementById('historyTable').outerHTML}
            <div style="page-break-after: always;"></div>
            <h2>2. 詳細每日記錄細目</h2>`);
        
        [...allDates].reverse().forEach(d => {
            const s = calculateDayScore(d);
            if(s.hasData) win.document.write(`
                <div class="day-block">
                    <h3>日期: ${d}</h3>
                    <p><strong>💊 藥物:</strong> ${s.mLogs.length ? s.mLogs.map(x=>`[${x.time}] ${x.timeSlot}`).join(', ') : '無'}</p>
                    <p><strong>💧 飲水 (總計 ${s.fSum}mL):</strong><br> ${s.fLogs.length ? s.fLogs.map(x=>`• [${x.time}] ${x.amt}mL`).join('<br>') : '無'}</p>
                    <p><strong>🥗 飲食:</strong><br> ${s.dLogs.length ? s.dLogs.map(x=>`• [${x.time}] ${x.name}`).join('<br>') : '無'}</p>
                </div>`);
        });
        win.document.write(`</body></html>`);
        win.document.close(); setTimeout(() => { win.print(); }, 500);
    }

    /* Standard App Logic (PIN, Tab switching, addFood etc remain same as previous version) */
    function showTab(id, btn) {
        document.querySelectorAll('.tab-content, .tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(id).classList.add('active'); btn.classList.add('active');
        if(id === 'calendarTab') renderMultiMonthCalendar();
        if(id === 'history') renderHistoryTable();
    }
    
    document.getElementById('pinInput').addEventListener('input', (e) => {
        if (e.target.value === CONFIG.PIN) {
            document.getElementById('pinOverlay').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            updateUI();
        }
    });

    function updateUI() {
        const s = calculateDayScore(new Date().toLocaleDateString());
        document.getElementById('curTotal').innerText = s.hasData ? s.fSum : 0;
        document.getElementById('progressBar').style.width = s.hasData ? Math.min((s.fSum/800)*100, 100) + '%' : '0%';
    }

    function renderHistoryTable() {
        const f = JSON.parse(localStorage.getItem('f_logs')||'[]');
        const d = JSON.parse(localStorage.getItem('d_logs')||'[]');
        const m = JSON.parse(localStorage.getItem('m_list')||'[]');
        const dates = [...new Set([...f.map(x=>x.date), ...d.map(x=>x.date), ...m.map(x=>x.date)])].sort((a,b) => new Date(b) - new Date(a));
        document.getElementById('historyBody').innerHTML = dates.map(date => {
            const s = calculateDayScore(date);
            return `<tr onclick="const el=document.getElementById('det-${date}'); el.style.display=el.style.display==='block'?'none':'block';"><td>${date}</td><td>${s.mOk?'✅':'❌'}</td><td>${s.fOk?'✅':'❌'}</td><td>${s.dOk?'✅':'❌'}</td></tr>
            <tr><td colspan="4"><div id="det-${date}" class="details-box">藥物: ${s.mLogs.map(x=>x.timeSlot).join(', ')}<br>飲水: ${s.fSum}mL</div></td></tr>`;
        }).join('');
    }
</script>
</body>
</html>
