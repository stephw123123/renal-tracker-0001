<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>腎臟健康追蹤日誌</title>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #f4f7f9; padding: 15px; line-height: 1.6; }
        .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h2 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 5px; margin-top: 0; }
        button { background: #3498db; color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; cursor: pointer; font-size: 16px; margin-top: 5px; }
        .warning { color: white; background: #e74c3c; padding: 10px; border-radius: 8px; margin-top: 10px; display: none; }
        .caution { color: #856404; background: #fff3cd; padding: 10px; border-radius: 8px; margin-top: 10px; display: none; border: 1px solid #ffeeba; }
        input[type="number"], input[type="password"], input[type="text"], select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        #pinOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #2c3e50; display: flex; justify-content: center; align-items: center; z-index: 1000; }
        
        /* Tab Styling */
        .tabs { display: flex; margin-bottom: 15px; gap: 5px; }
        .tab-btn { background: #d1d8e0; color: #4b6584; flex: 1; padding: 10px; border-radius: 8px 8px 0 0; text-align: center; cursor: pointer; }
        .tab-btn.active { background: #3498db; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* History Table */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        th, td { border-bottom: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #f8f9fa; }
    </style>
</head>
<body>

<div id="pinOverlay">
    <div class="card" style="width: 280px; text-align: center;">
        <h3>請輸入 PIN 碼</h3>
        <input type="password" id="pinInput" maxlength="4" placeholder="輸入 4 位數" inputmode="numeric">
    </div>
</div>

<div id="mainApp" style="display:none;">
    <h1>健康追蹤日誌</h1>

    <!-- Tabs Navigation -->
    <div class="tabs">
        <div class="tab-btn active" onclick="showTab('tracker')">今日記錄</div>
        <div class="tab-btn" onclick="showTab('history')">歷史記錄</div>
    </div>

    <!-- Tracker Tab -->
    <div id="tracker" class="tab-content active">
        <div class="card">
            <h2>💊 藥物紀錄</h2>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <label><input type="checkbox" id="m8"> 08:00 AM</label>
                <label><input type="checkbox" id="m12"> 12:00 PM</label>
                <label><input type="checkbox" id="m20"> 08:00 PM</label>
                <label><input type="checkbox" id="m22"> 10:00 PM</label>
            </div>
            <button onclick="saveMeds()" style="background:#27ae60; margin-top:15px;">儲存藥物紀錄</button>
        </div>

        <div class="card">
            <h2>💧 飲水 (上限 800mL)</h2>
            <input type="number" id="fluidAmt" placeholder="輸入毫升 (mL)">
            <button onclick="addFluid()">新增飲水</button>
            <p>今日累計: <strong id="totalFluid">0</strong> / 800 mL</p>
            <div id="fluidWarn" class="warning">⚠️ 注意：您已超過每日 800mL 限制！</div>
        </div>

        <div class="card">
            <h2>🥗 飲食追蹤</h2>
            <input type="text" id="foodName" placeholder="食物名稱">
            <select id="phosLevel">
                <option value="low">低磷 ✅</option>
                <option value="med">中磷 ⚠️</option>
                <option value="high">高磷 ❌</option>
            </select>
            <button onclick="addFood()" style="background:#f39c12;">記錄食物</button>
            <div id="dietWarn" class="caution">提示：高磷食物可能導致搔癢，請謹慎。</div>
        </div>
    </div>

    <!-- History Tab -->
    <div id="history" class="tab-content">
        <div class="card">
            <h2>📋 歷史清單</h2>
            <table id="historyTable">
                <thead>
                    <tr>
                        <th>時間</th>
                        <th>項目</th>
                        <th>數值/備註</th>
                    </tr>
                </thead>
                <tbody id="historyBody">
                    <!-- Data entries will appear here -->
                </tbody>
            </table>
            <button onclick="clearHistory()" style="background:#e74c3c; margin-top:20px; font-size:12px;">清空所有歷史資料</button>
        </div>
    </div>

    <button onclick="location.reload()" style="background:#34495e;">重新整理 / 鎖定</button>
</div>

<script>
    const pinInput = document.getElementById('pinInput');

    pinInput.addEventListener('input', () => {
        if (pinInput.value.length === 4) handleUnlock();
    });

    function handleUnlock() {
        if (pinInput.value === '1234') {
            document.getElementById('pinOverlay').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            updateUI();
        } else {
            alert('PIN 錯誤');
            pinInput.value = '';
        }
    }

    function showTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
        if(tabId === 'history') updateHistoryTable();
    }

    function addFluid() {
        let val = parseInt(document.getElementById('fluidAmt').value) || 0;
        if(val <= 0) return;
        
        let total = parseInt(localStorage.getItem('fluid_total') || 0);
        localStorage.setItem('fluid_total', total + val);
        
        saveHistory('飲水', `${val} mL`);
        document.getElementById('fluidAmt').value = '';
        updateUI();
    }

    function addFood() {
        const name = document.getElementById('foodName').value || '未命名食物';
        const level = document.getElementById('phosLevel').value;
        saveHistory('食物', `${name} (${level === 'high' ? '高磷' : (level === 'med' ? '中磷' : '低磷')})`);
        document.getElementById('dietWarn').style.display = (level === 'high') ? 'block' : 'none';
        document.getElementById('foodName').value = '';
        alert('食物已記錄');
    }

    function saveHistory(type, detail) {
        const history = JSON.parse(localStorage.getItem('health_history') || '[]');
        const now = new Date();
        const timeStr = `${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${now.getMinutes().toString().padStart(2, '0')}`;
        history.unshift({ time: timeStr, type: type, detail: detail });
        localStorage.setItem('health_history', JSON.stringify(history));
    }

    function updateHistoryTable() {
        const history = JSON.parse(localStorage.getItem('health_history') || '[]');
        const body = document.getElementById('historyBody');
        body.innerHTML = history.map(h => `<tr><td>${h.time}</td><td>${h.type}</td><td>${h.detail}</td></tr>`).join('');
    }

    function saveMeds() {
        const meds = {
            m8: document.getElementById('m8').checked,
            m12: document.getElementById('m12').checked,
            m20: document.getElementById('m20').checked,
            m22: document.getElementById('m22').checked
        };
        localStorage.setItem('med_records', JSON.stringify(meds));
        alert('藥物紀錄已儲存');
    }

    function clearHistory() {
        if(confirm('確定要永久刪除所有歷史記錄嗎？')) {
            localStorage.removeItem('health_history');
            localStorage.setItem('fluid_total', 0);
            updateHistoryTable();
            updateUI();
        }
    }

    function updateUI() {
        const total = localStorage.getItem('fluid_total') || 0;
        document.getElementById('totalFluid').innerText = total;
        document.getElementById('fluidWarn').style.display = (total > 800) ? 'block' : 'none';
        
        const meds = JSON.parse(localStorage.getItem('med_records') || '{}');
        ['m8', 'm12', 'm20', 'm22'].forEach(id => document.getElementById(id).checked = meds[id] || false);
    }
</script>
</body>
</html>
