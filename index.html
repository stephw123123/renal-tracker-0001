<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的健康日誌</title>
    <!-- Add Manifest for iOS Notification Support -->
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: -apple-system, sans-serif; background: #f4f7f9; padding: 15px; margin: 0; color: #2c3e50; }
        .card { background: white; border-radius: 15px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #eee; position: relative; }
        .food-section { background-color: #f1f8e9; border-left: 6px solid #8bc34a; }
        .med-section { background-color: #f3e5f5; border-left: 6px solid #9c27b0; }
        .fluid-section { background-color: #e3f2fd; border-left: 6px solid #2196f3; }
        .welcome-msg { color: #0d47a1; font-weight: bold; margin-bottom: 5px; font-size: 1.2rem; text-align: center; }
        .summary-msg { background: #fff; padding: 12px; border-radius: 10px; font-size: 0.95rem; margin-bottom: 20px; border-left: 4px solid #2196f3; color: #0d47a1; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .tabs { display: flex; margin-bottom: 15px; border-radius: 10px; overflow: hidden; border: 1px solid #ddd; background: #eee; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: #eee; cursor: pointer; font-weight: bold; color: #444; }
        .tab-btn.active { background: #3498db; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .notify-banner { background: #fffde7; border: 1px solid #fff59d; padding: 10px; border-radius: 10px; margin-bottom: 15px; text-align: center; font-size: 0.85rem; }
        .btn-notify { background: #fbc02d; color: #333; border: none; padding: 8px 15px; border-radius: 20px; font-weight: bold; cursor: pointer; margin-top: 5px; }
        input, select { padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
        button { background: #3498db; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }
        .progress-container { background: #fff; border-radius: 20px; height: 20px; width: 100%; margin: 10px 0; overflow: hidden; border: 1px solid #ddd; }
        #progressBar { background: #3498db; height: 100%; width: 0%; transition: width 0.5s ease; }
        #progressBar.over-limit { background: #e74c3c !important; }
        .fluid-warn-msg { color: #e74c3c; font-weight: bold; text-align: center; font-size: 0.9rem; margin-top: 5px; display: none; }
        .med-btn { background: white; color: #2c3e50; border: 2px solid #ddd; font-weight: normal; margin-bottom: 5px; font-size: 0.85rem; padding: 10px 5px; border-radius: 8px; }
        .med-btn.taken { background: #27ae60; color: white; border-color: #27ae60; }
        .entry-log-item { background: rgba(255,255,255,0.7); padding: 10px; border-radius: 8px; margin-bottom: 5px; font-size: 0.85rem; }
        .medical-comment { font-size: 0.8rem; color: #e67e22; background: #fff9f0; padding: 8px; border-radius: 5px; margin-top: 5px; border-left: 3px solid #f39c12; }
        #pinOverlay { position: fixed; inset: 0; background: #2c3e50; display: flex; justify-content: center; align-items: center; z-index: 1000; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; font-size: 0.85rem; }
        th, td { padding: 10px 5px; border-bottom: 1px solid #eee; text-align: center; }
        .details-box { display: none; background: #f9f9f9; padding: 12px; border-radius: 8px; margin-top: 5px; font-size: 0.85rem; text-align: left; border: 1px solid #ddd; line-height: 1.6; }
        .view-btn { background: #ecf0f1; color: #2c3e50; padding: 5px 8px; font-size: 0.75rem; border: 1px solid #bdc3c7; width: auto; display: inline-block; margin-top: 4px; }
        .cal-month-header { text-align: center; font-weight: bold; padding: 10px; background: #3498db; color: white; border-radius: 8px; margin: 20px 0 10px; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
        .cal-day { font-size: 0.9rem; padding: 5px 2px; border: 1px solid #f0f0f0; min-height: 65px; display: flex; flex-direction: column; align-items: center; background:#fff; }
        .cal-dot { width: 20px; height: 20px; border-radius: 50%; margin: 4px 0; -webkit-print-color-adjust: exact; }
        .cal-note { font-size: 0.55rem; color: #666; text-align: center; }

        .pdf-btn-group { 
            display: flex; 
            gap: 10px; 
            margin-bottom: 15px; 
            justify-content: center; 
        }
        
        .pdf-btn-group button { 
            width: 48%; 
            flex: none; 
            font-size: 0.8rem; 
            padding: 10px 5px; 
            font-weight: bold; 
            margin-top: 0; 
        }
                
    </style>
</head>
<body>

<div id="pinOverlay">
    <div class="card" style="width: 280px; text-align: center;">
        <h3>我的健康日誌 - 解鎖 📝🔓</h3>
        <input type="password" id="pinInput" maxlength="4" placeholder="輸入 PIN" inputmode="numeric" style="text-align:center; font-size: 20px;">
    </div>
</div>

<div id="mainApp" style="display:none;">
    <div class="welcome-msg">歡迎登錄你的健康日誌！</div>
    <div id="yesterdaySummary" class="summary-msg">正在分析昨日進度...</div>

    <div class="notify-banner">
        🔔 想在用藥時間收到提醒嗎？<br>
        <button class="btn-notify" onclick="setupNotifications()">開啟提醒功能</button>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('tracker', this)">今日記錄</button>
        <button class="tab-btn" onclick="showTab('history', this)">歷史詳情</button>
        <button class="tab-btn" onclick="showTab('calendarTab', this)">回顧月曆</button>
    </div>

    <div id="tracker" class="tab-content active">
        <div class="card" style="border: 2px solid #3498db;">
            <h2 style="border:none;">📍 我現在在哪裡？</h2>
            <select id="userLocation" onchange="toggleLocDetail()">
                <option value="屋企 (在客廳)">屋企 (在客廳)</option>
                <option value="屋企 (在床上)">屋企 (在床上)</option>
                <option value="街上/商場">街上/商場</option>
                <option value="醫院">醫院</option>
                <option value="其他">其他</option>
            </select>
            <input type="text" id="locDetail" placeholder="註明地點..." style="display:none;">
        </div>

        <div class="card food-section">
            <h2>🥗 自動飲食分析</h2>
            <input type="text" id="foodName" placeholder="輸入食物">
            <button onclick="addFood()" style="background:#689f38;">紀錄並分析</button>
            <div id="dailyFoodList" style="margin-top:10px;"></div>
        </div>

        <div class="card med-section">
            <h2>💊 藥物狀態記錄</h2>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <button class="med-btn" onclick="toggleMed('08:00 (早上)')">08:00 (早上)</button>
                <button class="med-btn" onclick="toggleMed('12:00 (中午)')">12:00 (中午)</button>
                <button class="med-btn" onclick="toggleMed('20:00 (晚上)')">20:00 (晚上)</button>
                <button class="med-btn" onclick="toggleMed('22:00 (睡覺前)')">22:00 (睡覺前)</button>
            </div>
            <div id="dailyMedList" style="margin-top:10px;"></div>
        </div>

        <div class="card fluid-section">
            <h2>💧 飲水進度 (<span id="curTotal">0</span>/800mL)</h2>
            <div class="progress-container"><div id="progressBar"></div></div>
            <div id="fluidLimitMsg" class="fluid-warn-msg">⚠️ 飲水量已超標，明天要多加注意喔！</div>
            <div style="display:flex; gap:5px;">
                <input type="number" id="fluidAmt" placeholder="mL" style="width:150px;">
                <select id="fluidType" style="flex-grow:1;"><option value="水">水</option><option value="其他">其他</option></select>
            </div>
            <button onclick="addFluid()" style="background:#1976d2;">新增記錄</button>
            <div id="dailyFluidList" style="margin-top:10px;"></div>
        </div>
    </div>

    <div id="history" class="tab-content">
        <div class="pdf-btn-group">
            <button onclick="exportToPDF(true)" style="background:#2980b9;">下載本月 PDF</button>
            <button onclick="exportToPDF(false)" style="background:#34495e;">下載全部 PDF</button>
        </div>
        <div class="card" style="padding:10px;"><table id="historyTable"><thead><tr><th style="width:35%">日期</th><th>藥物</th><th>飲水</th><th>飲食</th></tr></thead><tbody id="historyBody"></tbody></table></div>
    </div>

    <div id="calendarTab" class="tab-content">
        <div class="pdf-btn-group">
            <button onclick="exportToPDF(true)" style="background:#2980b9;">下載本月 PDF</button>
            <button onclick="exportToPDF(false)" style="background:#34495e;">下載全部 PDF</button>
        </div>
        <div id="multiMonthCalendarContainer"></div>
    </div>

    <button onclick="location.reload()" style="background:#34495e; margin-top:20px;">登出</button>
    <button style="background: #95a5a6; font-size: 12px; margin-top: 10px; border-radius: 8px; color: white; border: none; padding: 8px; width: 100%; margin-bottom: 50px;" onclick="if(confirm('確定清除所有數據？')) { localStorage.clear(); location.reload(); }">重置所有數據 (開始新紀錄)</button>
</div>

<script>
    const CONFIG = { LIMIT: 800, PIN: "1234" };
    const MED_SLOTS = ['08:00 (早上)', '12:00 (中午)', '20:00 (晚上)', '22:00 (睡覺前)'];
    const HIGH_PHOS_KEYWORDS = ["牛奶", "乳酪", "起司", "芝士", "豆", "豆奶", "醃肉","蛋黃", "牛肉", "豬肉", "內臟", "巧克力", "朱古力","可樂", "咖啡", "堅果", "罐頭"];
    const HIGH_PRO_KEYWORDS = ["雞肉", "魚", "肉", "蝦", "蟹", "海鮮"];

    // Register Service Worker for Notifications
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js').then(reg => {
                console.log('Service Worker registered');
            }).catch(err => {
                console.log('Service Worker registration failed', err);
            });
        });
    }

    function getTodayKey() { const d = new Date(); return `${d.getFullYear()}-${(d.getMonth()+1).toString().padStart(2,'0')}-${d.getDate().toString().padStart(2,'0')}`; }

    function setupNotifications() {
        if (!("Notification" in window)) {
            alert("此瀏覽器不支援通知功能。如果您是使用 iPhone，請先點擊分享並『加入主畫面』後從桌面圖示進入。");
            return;
        }
        Notification.requestPermission().then(permission => {
            if (permission === "granted") {
                alert("提醒功能已開啟！系統將於用藥時間提醒您。");
                startReminderCheck();
            } else {
                alert("您拒絕了通知權限，請在系統設定中重新開啟。");
            }
        });
    }

    function startReminderCheck() {
        setInterval(() => {
            const now = new Date();
            const t = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0');
            if (["08:00", "12:00", "20:00", "22:00"].includes(t)) {
                const today = getTodayKey();
                const m = JSON.parse(localStorage.getItem('m_list') || '[]').filter(l => l.date === today);
                if (!m.some(l => l.timeSlot.startsWith(t))) {
                    new Notification("💊 藥物記錄提醒", {
                        body: `現在是 ${t}，記得記錄你的藥物喔！`,
                        icon: "https://github.io"
                    });
                }
            }
        }, 60000);
    }

    function calculateDayScore(dateKey) {
        const f = JSON.parse(localStorage.getItem('f_logs') || '[]').filter(l => l.date === dateKey);
        const d = JSON.parse(localStorage.getItem('d_logs') || '[]').filter(l => l.date === dateKey);
        const m = JSON.parse(localStorage.getItem('m_list') || '[]').filter(l => l.date === dateKey);
        const fSum = f.reduce((s, l) => s + l.amt, 0);
        const mOk = MED_SLOTS.every(slot => m.map(x=>x.timeSlot).includes(slot));
        const fOk = fSum <= 800 && f.length > 0;
        const dOk = d.length > 0 && !d.some(l => l.risk);
        const hasData = f.length > 0 || d.length > 0 || m.length > 0;
        let score = 0, reasons = [];
        if (mOk) score++; else if(hasData) reasons.push("藥物未齊 😥");
        if (fOk) score++; else if(hasData && fSum > 800) reasons.push("水分超標 😨");
        if (dOk) score++; else if(hasData) reasons.push("注意飲食 🙅‍♀️");
        let color = score === 3 ? "green" : (score === 2 ? "darkorange" : (score === 1 ? "darkred" : "black"));
        return { score, color, reasons, hasData, f, d, m, fSum, mOk, fOk, dOk };
    }

    function addFood() {
        const n = document.getElementById('foodName').value; if(!n) return;
        const c = (function(f){
            let r = []; if(HIGH_PHOS_KEYWORDS.some(k=>f.includes(k))) r.push("⚠️注意高磷食物！請先跟註冊營養師或醫生商量你的餐飲選擇"); if(HIGH_PRO_KEYWORDS.some(k=>f.includes(k))) r.push(" "); if(f.includes("加工")||f.includes("火腿")||f.includes("香腸")) r.push("⛔注意高磷食物！請先跟註冊營養師或醫生商量你的餐飲選擇");
            return r.length > 0 ? r.join("/") : "";
        })(n);
        const entry = { id: Date.now(), date: getTodayKey(), time: new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}), name: n, comment: c, risk: c.includes("⚠️") || c.includes("⛔"), location: getSelectedLocation() };
        let l = JSON.parse(localStorage.getItem('d_logs') || '[]'); l.unshift(entry); localStorage.setItem('d_logs', JSON.stringify(l));
        document.getElementById('foodName').value = ''; updateUI();
    }

    function addFluid() {
        const a = parseInt(document.getElementById('fluidAmt').value); if(!a) return;
        const entry = { id: Date.now(), date: getTodayKey(), time: new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}), amt: a, label: document.getElementById('fluidType').value, location: getSelectedLocation() };
        let l = JSON.parse(localStorage.getItem('f_logs') || '[]'); l.unshift(entry); localStorage.setItem('f_logs', JSON.stringify(l));
        document.getElementById('fluidAmt').value = ''; updateUI();
    }

    function toggleMed(slot) {
        let l = JSON.parse(localStorage.getItem('m_list') || '[]'); const today = getTodayKey();
        const ex = l.find(x => x.date === today && x.timeSlot === slot);
        if (ex) { if(confirm("取消記錄？")) l = l.filter(x => x !== ex); }
        else { l.unshift({ id: Date.now(), date: today, time: new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}), timeSlot: slot, location: getSelectedLocation() }); }
        localStorage.setItem('m_list', JSON.stringify(l)); updateUI();
    }

        function updateUI() {
        const s = calculateDayScore(getTodayKey());
        document.getElementById('curTotal').innerText = s.fSum;
        const bar = document.getElementById('progressBar');
        bar.style.width = Math.min((s.fSum/800)*100, 100) + '%';
        if (s.fSum > 800) { bar.classList.add('over-limit'); document.getElementById('fluidLimitMsg').style.display = 'block'; }
        else { bar.classList.remove('over-limit'); document.getElementById('fluidLimitMsg').style.display = 'none'; }
        
        const btns = document.getElementsByClassName('med-btn');
        MED_SLOTS.forEach((t, i) => btns[i].className = s.m.some(x=>x.timeSlot===t) ? "med-btn taken" : "med-btn");
        
        // This builder now creates the text PLUS the Edit/Delete buttons
        const builder = (logs, storageKey) => logs.map(x => `
            <div class="entry-log-item">
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <div style="flex-grow:1;">
                        [${x.time}] ${x.name || x.label || x.timeSlot} ${x.amt ? x.amt+'mL' : ''} @${x.location || '未註明'}
                        ${x.comment ? `<div class="medical-comment">${x.comment}</div>` : ''}
                    </div>
                    <div style="display:flex; gap:5px; margin-left:10px;">
                        <button onclick="editItem('${storageKey}', ${x.id})" style="background:#f1c40f; color:black; padding:4px 8px; font-size:10px; width:auto; height:auto; margin:0;">修改</button>
                        <button onclick="deleteItem('${storageKey}', ${x.id})" style="background:#e74c3c; color:white; padding:4px 8px; font-size:10px; width:auto; height:auto; margin:0;">刪除</button>
                    </div>
                </div>
            </div>`).join('');
            
        document.getElementById('dailyFluidList').innerHTML = builder(s.f, 'f_logs');
        document.getElementById('dailyFoodList').innerHTML = builder(s.d, 'd_logs');
        document.getElementById('dailyMedList').innerHTML = builder(s.m, 'm_list');
    }

    // IMPORTANT: Make sure you also paste these two functions below the new updateUI
    function deleteItem(storageKey, id) {
        if(!confirm("確定刪除此記錄？")) return;
        let logs = JSON.parse(localStorage.getItem(storageKey) || '[]');
        localStorage.setItem(storageKey, JSON.stringify(logs.filter(l => l.id !== id)));
        updateUI();
    }

    function editItem(storageKey, id) {
        let logs = JSON.parse(localStorage.getItem(storageKey) || '[]');
        let item = logs.find(l => l.id === id);
        if (storageKey === 'f_logs') {
            let newAmt = prompt("修改飲水量 (mL):", item.amt);
            if(newAmt) item.amt = parseInt(newAmt);
        } else if (storageKey === 'd_logs') {
            let newName = prompt("修改食物名稱:", item.name);
            if(newName) { item.name = newName; }
        }
        let newLoc = prompt("修改位置:", item.location || "");
        if(newLoc !== null) item.location = newLoc;
        localStorage.setItem(storageKey, JSON.stringify(logs));
        updateUI();
    }

    function renderMultiMonthCalendar() {
        const c = document.getElementById('multiMonthCalendarContainer'); c.innerHTML = '';
        const now = new Date(); const y = now.getFullYear(); const m = now.getMonth();
        const allLogs = [...JSON.parse(localStorage.getItem('f_logs')||'[]'), ...JSON.parse(localStorage.getItem('m_list')||'[]'), ...JSON.parse(localStorage.getItem('d_logs')||'[]')];
        const allDates = [...new Set(allLogs.map(l => l.date))];
        const my = [...new Set(allDates.map(d => { const dt = new Date(d); return `${dt.getFullYear()}/${dt.getMonth()+1}`; }))].sort((a,b) => b.localeCompare(a));
        if(!my.length) my.push(`${y}/${m+1}`);
        my.forEach(x => {
            const [curY, curM] = x.split('/').map(Number);
            c.innerHTML += `<div class="cal-month-header">${curY} 年 ${curM} 月</div>`;
            const g = document.createElement('div'); g.className = 'cal-grid';
            ["日","一","二","三","四","五","六"].forEach(w => g.innerHTML += `<div class="cal-day cal-header">${w}</div>`);
            const first = new Date(curY, curM-1, 1).getDay(); const total = new Date(curY, curM, 0).getDate();
            for(let i=0; i<first; i++) g.innerHTML += `<div class="cal-day" style="background:#f9f9f9"></div>`;
            for(let day=1; day<=total; day++) {
                const dk = `${curY}-${curM.toString().padStart(2,'0')}-${day.toString().padStart(2,'0')}`;
                const s = calculateDayScore(dk);
                g.innerHTML += `<div class="cal-day"><div style="font-weight:bold">${day}</div>${s.hasData?`<div class="cal-dot" style="background:${s.color}"></div><div class="cal-note">${s.score===3?'完成晒!':s.reasons.join('<br>')}</div>`:''}</div>`;
            }
            c.appendChild(g);
        });
    }

    function renderHistoryTable() {
        const logs = [...JSON.parse(localStorage.getItem('f_logs')||'[]'), ...JSON.parse(localStorage.getItem('d_logs')||'[]'), ...JSON.parse(localStorage.getItem('m_list')||'[]')];
        const dates = [...new Set(logs.map(x=>x.date))].sort((a,b) => b.localeCompare(a));
        document.getElementById('historyBody').innerHTML = dates.map(d => {
            const s = calculateDayScore(d); const id = d.replace(/-/g, '_');
            return `<tr><td>${d}<br><button class="view-btn" onclick="const e=document.getElementById('det-${id}'); e.style.display=e.style.display==='block'?'none':'block';">查看詳情</button></td>
                <td>${s.mOk?'✅':'❌'}</td><td>${s.fOk?'✅':'❌'}</td><td>${s.dOk?'✅':'❌'}</td></tr>
            <tr><td colspan="4"><div id="det-${id}" class="details-box">藥物: ${s.m.map(x=>x.timeSlot).join(', ') || '無'}<br>飲水: ${s.fSum}mL<br>飲食: ${s.d.map(x=>x.name).join(', ')}</div></td></tr>`;
        }).join('');
    }

    function exportToPDF(thisMonthOnly) {
        const allLogs = [...JSON.parse(localStorage.getItem('f_logs')||'[]'), ...JSON.parse(localStorage.getItem('d_logs')||'[]'), ...JSON.parse(localStorage.getItem('m_list')||'[]')];
        const dates = [...new Set(allLogs.map(l => l.date))].sort();
        const win = window.open('', '', 'height=800,width=900');
        win.document.write(`<html><head><title>健康報告</title><style>
            body { font-family: sans-serif; padding: 30px; line-height:1.5; color:#333; }
            h1, h2 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 5px; }
            table { width: 100%; border-collapse: collapse; margin: 20px 0; }
            th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
            .cal-month-header { text-align: center; font-weight: bold; padding: 10px; background: #3498db; color: white; border-radius: 8px; margin: 20px 0 10px; }
            .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
            .cal-day { font-size: 0.9rem; padding: 5px 2px; border: 1px solid #f0f0f0; min-height: 65px; display: flex; flex-direction: column; align-items: center; background:#fff; }
            .cal-dot { width: 20px; height: 20px; border-radius: 50%; margin: 4px 0; -webkit-print-color-adjust: exact; }
            .day-block { margin-top: 40px; page-break-inside: avoid; border-top: 1px solid #eee; padding-top: 20px; }
        </style></head><body>
            <h1>腎臟健康進度報告</h1>
            ${document.getElementById('historyTable').outerHTML}
            <div style="page-break-before: always;"></div>
            ${document.getElementById('multiMonthCalendarContainer').innerHTML}
            <div style="page-break-before: always;"></div>
            <h2>詳細記錄細目</h2>`);

        dates.reverse().forEach(d => {
            const s = calculateDayScore(d);
            if(s.hasData) win.document.write(`<div class="day-block"><h3>日期: ${d}</h3><p>💊 藥物: ${s.m.map(x=>`[${x.time}] ${x.timeSlot}`).join(', ')}</p><p>💧 飲水: ${s.fSum}mL</p><p>🥗 飲食: ${s.d.map(x=>x.name).join(', ')}</p></div>`);
        });

        win.document.write(`</body></html>`);
        win.document.close();
        setTimeout(() => win.print(), 800);
    }

    function toggleLocDetail() { document.getElementById('locDetail').style.display = (document.getElementById('userLocation').value === '其他') ? 'block' : 'none'; }
    function getSelectedLocation() { const l = document.getElementById('userLocation').value; return l === '其他' ? `其他(${document.getElementById('locDetail').value})` : l; }
    function showTab(id, btn) { document.querySelectorAll('.tab-content, .tab-btn').forEach(el => el.classList.remove('active')); document.getElementById(id).classList.add('active'); btn.classList.add('active'); if(id === 'calendarTab') renderMultiMonthCalendar(); if(id === 'history') renderHistoryTable(); }

    document.getElementById('pinInput').addEventListener('input', (e) => {
        if (e.target.value === CONFIG.PIN) {
            document.getElementById('pinOverlay').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            updateUI(); 
            const yDate = new Date(); yDate.setDate(yDate.getDate()-1);
            const yKey = `${yDate.getFullYear()}-${(yDate.getMonth()+1).toString().padStart(2,'0')}-${yDate.getDate().toString().padStart(2,'0')}`;
            const s = calculateDayScore(yKey); const div = document.getElementById('yesterdaySummary');
            if(!s.hasData) div.innerHTML = "今天是新的一天！💪";
            else if(s.score === 3) div.innerHTML = "🌟 昨天你做得很好，在三個範疇都成功拿到了 ✅！今天你都可以做得到的。";
            else div.innerHTML = `昨天你沒有拿到所有的 ✅！注意：${s.reasons.join('、')}。繼續加油！💪`;
        }
    });
</script>
</body>
</html>
