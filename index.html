<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>腎臟健康智能日誌</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f4f7f9; padding: 15px; margin: 0; color: #2c3e50; }
        .card { background: white; border-radius: 15px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        h2 { border-bottom: 2px solid #3498db; padding-bottom: 5px; margin-top: 0; font-size: 1.1rem; }
        
        /* Tabs & Progress Bar */
        .tabs { display: flex; margin-bottom: 15px; border-radius: 10px; overflow: hidden; border: 1px solid #ddd; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: #eee; cursor: pointer; font-weight: bold; }
        .tab-btn.active { background: #3498db; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .progress-container { background: #eee; border-radius: 20px; height: 20px; width: 100%; margin: 10px 0; overflow: hidden; }
        #progressBar { background: #3498db; height: 100%; width: 0%; transition: width 0.5s ease; }
        .limit-reached { background-color: #e74c3c !important; }

        /* Entry & History Layout */
        .entry-item { border-bottom: 1px dotted #ccc; padding: 10px 0; font-size: 0.9rem; }
        .medical-comment { font-size: 0.8rem; color: #e67e22; background: #fff9f0; padding: 5px 10px; border-radius: 5px; margin-top: 5px; border-left: 3px solid #f39c12; }
        button { background: #3498db; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.85rem; }
        th, td { padding: 10px; border-bottom: 1px solid #eee; text-align: center; }
        
        #pinOverlay { position: fixed; inset: 0; background: #2c3e50; display: flex; justify-content: center; align-items: center; z-index: 1000; }
    </style>
</head>
<body>

<div id="pinOverlay">
    <div class="card" style="width: 280px; text-align: center;">
        <h3>解鎖日誌</h3>
        <input type="password" id="pinInput" maxlength="4" placeholder="PIN" inputmode="numeric" style="text-align:center; font-size: 20px; width: 80%; padding: 10px;">
    </div>
</div>

<div id="mainApp" style="display:none;">
    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('tracker', this)">今日記錄</button>
        <button class="tab-btn" onclick="showTab('history', this)">歷史回顧</button>
    </div>

    <div id="tracker" class="tab-content active">
        <div class="card">
            <h2>💧 飲水進度 (<span id="curTotal">0</span>/800mL)</h2>
            <div class="progress-container"><div id="progressBar"></div></div>
            <div style="display:flex; gap:5px;">
                <input type="number" id="fluidAmt" placeholder="mL" style="width:70px; padding:10px;">
                <select id="fluidType" style="flex-grow:1; padding:10px;">
                    <option value="水">白開水</option>
                    <option value="湯">湯/羹</option>
                    <option value="茶/咖啡">茶/咖啡</option>
                    <option value="其他">其他液體</option>
                </select>
            </div>
            <button onclick="addFluid()">新增記錄</button>
            <div id="dailyFluidList" style="margin-top:10px;"></div>
        </div>

        <div class="card">
            <h2>🥗 自動飲食分析</h2>
            <input type="text" id="foodName" placeholder="請輸入食物 (例如：牛肉、牛奶、香蕉)" style="width:100%; padding:12px; border:1px solid #ddd; border-radius:8px;">
            <button onclick="addFood()" style="background:#f39c12;">紀錄並分析</button>
            <div id="dailyFoodList" style="margin-top:10px;"></div>
        </div>

        <div class="card">
            <h2>💊 藥物狀態</h2>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                <label><input type="checkbox" id="m8"> 08:00</label>
                <label><input type="checkbox" id="m12"> 12:00</label>
                <label><input type="checkbox" id="m20"> 20:00</label>
                <label><input type="checkbox" id="m22"> 22:00</label>
            </div>
            <button onclick="saveMeds()" style="background:#27ae60;">儲存進度</button>
        </div>
    </div>

    <div id="history" class="tab-content">
        <div class="card">
            <h2>📋 每日成功指標</h2>
            <table id="historyTable">
                <thead><tr><th>日期</th><th>藥物</th><th>飲水</th><th>飲食</th></tr></thead>
                <tbody id="historyBody"></tbody>
            </table>
            <p style="font-size:0.75rem; color:#666; margin-top:15px;">✅ 成功指標：藥物全服、飲水700-800mL、飲食無高磷風險。</p>
        </div>
    </div>
</div>

<script>
    /* --- Medical Knowledge Base --- */
    const HIGH_PHOS_KEYWORDS = ["牛奶", "乳酪", "起司", "豆", "蛋黃", "牛肉", "豬肉", "內臟", "巧克力", "可樂", "咖啡", "堅果", "罐頭"];
    const HIGH_PRO_KEYWORDS = ["雞肉", "魚", "肉", "蝦", "蟹", "海鮮"];

    function getMedicalComment(food) {
        let comments = [];
        if (HIGH_PHOS_KEYWORDS.some(k => food.includes(k))) comments.push("⚠️ 注意：此食物含磷較高。過多的磷會導致皮膚瘙癢和骨骼問題。");
        if (HIGH_PRO_KEYWORDS.some(k => food.includes(k))) comments.push("ℹ️ 提醒：這是一種高蛋白質食物。請確保攝取量符合營養師的建議。");
        if (food.includes("加工") || food.includes("火腿") || food.includes("香腸")) comments.push("⛔ 警告：加工食品含有極易被吸收的無機磷，請盡量避免。");
        return comments.length > 0 ? comments.join("<br>") : "✅ 良好的選擇，請繼續保持。";
    }

    const pinInput = document.getElementById('pinInput');
    pinInput.addEventListener('input', () => { if (pinInput.value === '1234') { document.getElementById('pinOverlay').style.display='none'; document.getElementById('mainApp').style.display='block'; updateUI(); } });

    function showTab(tabId, btn) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        btn.classList.add('active');
        if(tabId === 'history') renderHistory();
    }

    function getToday() { return new Date().toLocaleDateString(); }

    function addFluid() {
        const amt = parseInt(document.getElementById('fluidAmt').value);
        if (!amt || amt <= 0) return;
        const entry = { date: getToday(), time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}), amt, type: document.getElementById('fluidType').value };
        const data = JSON.parse(localStorage.getItem('fluid_logs') || '[]');
        data.unshift(entry);
        localStorage.setItem('fluid_logs', JSON.stringify(data));
        document.getElementById('fluidAmt').value = '';
        updateUI();
    }

    function addFood() {
        const name = document.getElementById('foodName').value;
        if (!name) return;
        const comment = getMedicalComment(name);
        const entry = { date: getToday(), name, comment, risk: comment.includes("⚠️") || comment.includes("⛔") };
        const data = JSON.parse(localStorage.getItem('diet_logs') || '[]');
        data.unshift(entry);
        localStorage.setItem('diet_logs', JSON.stringify(data));
        document.getElementById('foodName').value = '';
        updateUI();
    }

    function saveMeds() {
        const meds = { m8: document.getElementById('m8').checked, m12: document.getElementById('m12').checked, m20: document.getElementById('m20').checked, m22: document.getElementById('m22').checked };
        const allMeds = JSON.parse(localStorage.getItem('med_logs') || '{}');
        allMeds[getToday()] = meds;
        localStorage.setItem('med_logs', JSON.stringify(allMeds));
        alert("儲存成功");
    }

    function updateUI() {
        const fLogs = JSON.parse(localStorage.getItem('fluid_logs') || '[]').filter(l => l.date === getToday());
        const dLogs = JSON.parse(localStorage.getItem('diet_logs') || '[]').filter(l => l.date === getToday());
        const total = fLogs.reduce((s, l) => s + l.amt, 0);
        
        document.getElementById('curTotal').innerText = total;
        const bar = document.getElementById('progressBar');
        bar.style.width = Math.min((total/800)*100, 100) + '%';
        bar.className = total > 800 ? 'limit-reached' : '';

        document.getElementById('dailyFluidList').innerHTML = fLogs.map(l => `<div class="entry-item"><span>${l.time} ${l.type}</span><strong>${l.amt}mL</strong></div>`).join('');
        document.getElementById('dailyFoodList').innerHTML = dLogs.map(d => `<div class="entry-item"><strong>${d.name}</strong><div class="medical-comment">${d.comment}</div></div>`).join('');
        
        const meds = JSON.parse(localStorage.getItem('med_logs') || '{}')[getToday()] || {};
        ['m8', 'm12', 'm20', 'm22'].forEach(id => document.getElementById(id).checked = meds[id] || false);
    }

    function renderHistory() {
        const fLogs = JSON.parse(localStorage.getItem('fluid_logs') || '[]');
        const dLogs = JSON.parse(localStorage.getItem('diet_logs') || '[]');
        const mLogs = JSON.parse(localStorage.getItem('med_logs') || '{}');
        const dates = [...new Set([...fLogs.map(l=>l.date), ...dLogs.map(l=>l.date), ...Object.keys(mLogs)])].sort().reverse();

        document.getElementById('historyBody').innerHTML = dates.map(d => {
            const fSum = fLogs.filter(l => l.date === d).reduce((s, l) => s + l.amt, 0);
            const fluidTick = (fSum >= 700 && fSum <= 800) ? '✅' : '❌';
            const dietRisk = dLogs.filter(l => l.date === d).some(l => l.risk);
            const dietTick = (dLogs.filter(l=>l.date===d).length > 0 && !dietRisk) ? '✅' : '❌';
            const m = mLogs[d] || {};
            const medTick = (m.m8 && m.m12 && m.m20 && m.m22) ? '✅' : '❌';
            return `<tr><td>${d}</td><td>${medTick}</td><td>${fluidTick}</td><td>${dietTick}</td></tr>`;
        }).join('');
    }
</script>
</body>
</html>
