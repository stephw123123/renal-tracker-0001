<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的健康日誌</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f4f7f9; padding: 15px; margin: 0; color: #2c3e50; }
        .card { background: white; border-radius: 15px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #eee; position: relative; }
        
        /* Section Backgrounds */
        .food-section { background-color: #f1f8e9; border-left: 6px solid #8bc34a; }
        .med-section { background-color: #f3e5f5; border-left: 6px solid #9c27b0; }
        .fluid-section { background-color: #e3f2fd; border-left: 6px solid #2196f3; }

        .welcome-msg { color: #0d47a1; font-weight: bold; margin-bottom: 5px; font-size: 1.2rem; text-align: center; }
        .summary-msg { background: #fff; padding: 12px; border-radius: 10px; font-size: 0.95rem; margin-bottom: 20px; border-left: 4px solid #2196f3; color: #0d47a1; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        
        .tabs { display: flex; margin-bottom: 15px; border-radius: 10px; overflow: hidden; border: 1px solid #ddd; background: #eee; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: #eee; cursor: pointer; font-weight: bold; color: #444; }
        .tab-btn.active { background: #3498db; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Reminder Button Styling */
        .notify-banner { background: #fffde7; border: 1px solid #fff59d; padding: 10px; border-radius: 10px; margin-bottom: 15px; text-align: center; font-size: 0.85rem; }
        .btn-notify { background: #fbc02d; color: #333; border: none; padding: 8px 15px; border-radius: 20px; font-weight: bold; cursor: pointer; margin-top: 5px; }

        input, select { padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
        button { background: #3498db; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }
        .progress-container { background: #fff; border-radius: 20px; height: 20px; width: 100%; margin: 10px 0; overflow: hidden; border: 1px solid #ddd; }
        #progressBar { background: #3498db; height: 100%; width: 0%; transition: width 0.5s ease; }
        
        .med-btn { background: white; color: #2c3e50; border: 2px solid #ddd; font-weight: normal; margin-bottom: 5px; font-size: 0.85rem; padding: 10px 5px; border-radius: 8px; }
        .med-btn.taken { background: #27ae60; color: white; border-color: #27ae60; }
        
        .entry-log-item { background: rgba(255,255,255,0.7); padding: 10px; border-radius: 8px; margin-bottom: 5px; font-size: 0.85rem; }
        .cal-month-header { text-align: center; font-weight: bold; padding: 10px; background: #3498db; color: white; border-radius: 8px; margin: 20px 0 10px; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
        .cal-day { font-size: 0.9rem; padding: 5px 2px; border-radius: 4px; background: #fff; border: 1px solid #f0f0f0; min-height: 65px; display: flex; flex-direction: column; align-items: center; }
        .cal-dot { width: 20px; height: 20px; border-radius: 50%; margin: 4px 0; }
        #pinOverlay { position: fixed; inset: 0; background: #2c3e50; display: flex; justify-content: center; align-items: center; z-index: 1000; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; font-size: 0.85rem; }
        th, td { padding: 10px 5px; border-bottom: 1px solid #eee; text-align: center; }
    </style>
</head>
<body>

<div id="pinOverlay">
    <div class="card" style="width: 280px; text-align: center;">
        <h3>我的健康日誌 - 解鎖 📝🔓</h3>
        <input type="password" id="pinInput" maxlength="4" placeholder="輸入 PIN" inputmode="numeric" style="text-align:center; font-size: 20px;">
    </div>
</div>

<div id="mainApp" style="display:none;">
    <div class="welcome-msg">歡迎登錄你的健康日誌！</div>
    <div id="yesterdaySummary" class="summary-msg">分析中...</div>

    <!-- Notification Setup -->
    <div class="notify-banner">
        🔔 想在用藥時間收到提醒嗎？<br>
        <button class="btn-notify" onclick="setupNotifications()">開啟提醒功能</button>
    </div>

    <div class="card" style="border: 2px solid #3498db;">
        <h2 style="border:none;">📍 我現在在哪裡？</h2>
        <select id="userLocation" onchange="toggleLocDetail()">
            <option value="屋企 (在客廳)">屋企 (在客廳)</option>
            <option value="屋企 (在床上)">屋企 (在床上)</option>
            <option value="街上/商場">街上/商場</option>
            <option value="醫院">醫院</option>
            <option value="其他">其他</option>
        </select>
        <input type="text" id="locDetail" placeholder="註明地點..." style="display:none;">
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('tracker', this)">今日記錄</button>
        <button class="tab-btn" onclick="showTab('history', this)">歷史詳情</button>
        <button class="tab-btn" onclick="showTab('calendarTab', this)">回顧月曆</button>
    </div>

    <div id="tracker" class="tab-content active">
        <div class="card food-section">
            <h2>🥗 自動飲食分析</h2>
            <input type="text" id="foodName" placeholder="輸入食物">
            <button onclick="addFood()" style="background:#689f38;">紀錄並分析</button>
            <div id="dailyFoodList" style="margin-top:10px;"></div>
        </div>

        <div class="card med-section">
            <h2>💊 藥物狀態記錄</h2>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <button class="med-btn" onclick="toggleMed('08:00 (早上)')">08:00 (早上)</button>
                <button class="med-btn" onclick="toggleMed('12:00 (中午)')">12:00 (中午)</button>
                <button class="med-btn" onclick="toggleMed('20:00 (晚上)')">20:00 (晚上)</button>
                <button class="med-btn" onclick="toggleMed('22:00 (睡覺前)')">22:00 (睡覺前)</button>
            </div>
            <div id="dailyMedList" style="margin-top:10px;"></div>
        </div>

        <div class="card fluid-section">
            <h2>💧 飲水進度 (<span id="curTotal">0</span>/800mL)</h2>
            <div class="progress-container"><div id="progressBar"></div></div>
            <div style="display:flex; gap:5px;">
                <input type="number" id="fluidAmt" placeholder="mL" style="width:120px;">
                <select id="fluidType" style="flex-grow:1;"><option value="水">水</option><option value="其他">其他</option></select>
            </div>
            <button onclick="addFluid()" style="background:#1976d2;">新增記錄</button>
            <div id="dailyFluidList" style="margin-top:10px;"></div>
        </div>
    </div>

    <!-- History Tab -->
    <div id="history" class="tab-content">
        <button onclick="exportToPDF()" style="background:#2980b9; margin-bottom:15px;">下載為 PDF (分享給心理學家)</button>
        <div class="card"><table id="historyTable"><thead><tr><th style="width:35%">日期</th><th>藥物</th><th>飲水</th><th>飲食</th></tr></thead><tbody id="historyBody"></tbody></table></div>
    </div>

    <!-- Calendar Tab -->
    <div id="calendarTab" class="tab-content">
        <button onclick="exportToPDF()" style="background:#2980b9; margin-bottom:15px;">下載為 PDF (分享給心理學家)</button>
        <div id="multiMonthCalendarContainer"></div>
    </div>

    <button onclick="location.reload()" style="background:#34495e; margin:20px 0 40px;">登出</button>
</div>

<script>
    const CONFIG = { LIMIT: 800, PIN: "1234" };
    const MED_SLOTS = ['08:00 (早上)', '12:00 (中午)', '20:00 (晚上)', '22:00 (睡覺前)'];

    // --- NOTIFICATION LOGIC ---
    function setupNotifications() {
        if (!("Notification" in window)) {
            alert("抱歉，您的瀏覽器不支援提醒功能。");
            return;
        }
        Notification.requestPermission().then(permission => {
            if (permission === "granted") {
                alert("提醒功能已開啟！請確保不要徹底關閉此網頁頁面。");
                startReminderCheck();
            }
        });
    }

    function startReminderCheck() {
        setInterval(() => {
            const now = new Date();
            const currentTime = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
            
            // Check against our 4 slots
            const reminderTimes = ["08:00", "12:00", "20:00", "22:00"];
            if (reminderTimes.includes(currentTime)) {
                checkAndNotify(currentTime);
            }
        }, 60000); // Check every minute
    }

    function checkAndNotify(timeStr) {
        const today = normalizeDate(new Date().toLocaleDateString());
        const mLogs = JSON.parse(localStorage.getItem('m_list') || '[]').filter(l => normalizeDate(l.date) === today);
        const alreadyTaken = mLogs.some(l => l.timeSlot.startsWith(timeStr));

        if (!alreadyTaken && Notification.permission === "granted") {
            new Notification("💊 健康日誌提醒", {
                body: `現在是 ${timeStr}，記得記錄您的藥物喔！`,
                icon: "https://github.io" 
            });
        }
    }

    // --- EXISTING APP LOGIC ---
    function normalizeDate(dateStr) { const d = new Date(dateStr); return isNaN(d.getTime()) ? dateStr : `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`; }
    function toggleLocDetail() { document.getElementById('locDetail').style.display = (document.getElementById('userLocation').value === '其他') ? 'block' : 'none'; }
    function getSelectedLocation() { const loc = document.getElementById('userLocation').value; return loc === '其他' && document.getElementById('locDetail').value ? `其他(${document.getElementById('locDetail').value})` : loc; }

    function calculateDayScore(dateStr) {
        const norm = normalizeDate(dateStr);
        const f = JSON.parse(localStorage.getItem('f_logs') || '[]').filter(l => normalizeDate(l.date) === norm);
        const d = JSON.parse(localStorage.getItem('d_logs') || '[]').filter(l => normalizeDate(l.date) === norm);
        const m = JSON.parse(localStorage.getItem('m_list') || '[]').filter(l => normalizeDate(l.date) === norm);
        const fSum = f.reduce((s, l) => s + l.amt, 0);
        const fOk = fSum >= 700 && fSum <= 800;
        const dOk = d.length > 0 && !d.some(l => l.risk);
        const mOk = MED_SLOTS.every(t => m.map(x=>x.timeSlot).includes(t));
        const hasData = f.length > 0 || d.length > 0 || m.length > 0;
        let score = 0; let reasons = [];
        if (mOk) score++; else if(hasData) reasons.push("藥物未齊 😥");
        if (fOk) score++; else if(hasData) reasons.push(fSum > 800 ? "水分超標 😨" : "水分不足");
        if (dOk) score++; else if(hasData) reasons.push("注意飲食 🙅‍♀️");
        let color = score === 3 ? "green" : (score === 2 ? "darkorange" : (score === 1 ? "darkred" : "black"));
        return { score, color, reasons, hasData, f, d, m, fSum, mOk, fOk, dOk };
    }

    function addFluid() {
        const amt = parseInt(document.getElementById('fluidAmt').value); if(!amt) return;
        const entry = { id: Date.now(), date: normalizeDate(new Date().toLocaleDateString()), time: new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}), amt, label: document.getElementById('fluidType').value, location: getSelectedLocation() };
        let logs = JSON.parse(localStorage.getItem('f_logs') || '[]');
        logs.unshift(entry); localStorage.setItem('f_logs', JSON.stringify(logs));
        document.getElementById('fluidAmt').value = ''; updateUI();
    }

    function addFood() {
        const name = document.getElementById('foodName').value; if(!name) return;
        const entry = { id: Date.now(), date: normalizeDate(new Date().toLocaleDateString()), time: new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}), name, risk: false, location: getSelectedLocation() };
        let logs = JSON.parse(localStorage.getItem('d_logs') || '[]');
        logs.unshift(entry); localStorage.setItem('d_logs', JSON.stringify(logs));
        document.getElementById('foodName').value = ''; updateUI();
    }

    function toggleMed(slot) {
        let logs = JSON.parse(localStorage.getItem('m_list') || '[]');
        const today = normalizeDate(new Date().toLocaleDateString());
        const existing = logs.find(l => normalizeDate(l.date) === today && l.timeSlot === slot);
        if (existing) { if(confirm("取消？")) logs = logs.filter(l => l !== existing); }
        else { logs.unshift({ id: Date.now(), date: today, time: new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}), timeSlot: slot, location: getSelectedLocation() }); }
        localStorage.setItem('m_list', JSON.stringify(logs)); updateUI();
    }

    function updateUI() {
        const s = calculateDayScore(new Date().toLocaleDateString());
        document.getElementById('curTotal').innerText = s.fSum;
        document.getElementById('progressBar').style.width = Math.min((s.fSum/800)*100, 100) + '%';
        const btns = document.getElementsByClassName('med-btn');
        MED_SLOTS.forEach((t, i) => btns[i].className = s.m.some(x=>x.timeSlot===t) ? "med-btn taken" : "med-btn");
        const builder = (logs) => logs.map(l => `<div class="entry-log-item">[${l.time}] ${l.name || l.label || l.timeSlot} ${l.amt?l.amt+'mL':''} @${l.location || '屋企'}</div>`).join('');
        document.getElementById('dailyFluidList').innerHTML = builder(s.f);
        document.getElementById('dailyFoodList').innerHTML = builder(s.d);
        document.getElementById('dailyMedList').innerHTML = builder(s.m);
    }

    function showTab(id, btn) {
        document.querySelectorAll('.tab-content, .tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(id).classList.add('active'); btn.classList.add('active');
        if(id === 'calendarTab') renderMultiMonthCalendar();
        if(id === 'history') renderHistoryTable();
    }

    function renderMultiMonthCalendar() {
        const container = document.getElementById('multiMonthCalendarContainer'); container.innerHTML = '';
        const allLogs = [...JSON.parse(localStorage.getItem('f_logs')||'[]'), ...JSON.parse(localStorage.getItem('m_list')||'[]'), ...JSON.parse(localStorage.getItem('d_logs')||'[]')];
        const allDates = [...new Set(allLogs.map(l => normalizeDate(l.date)))];
        const monthYears = [...new Set(allDates.map(d => { const dt = new Date(d); return `${dt.getFullYear()}/${dt.getMonth()}`; }))].sort((a,b) => b.localeCompare(a));
        if(!monthYears.length) monthYears.push(`${new Date().getFullYear()}/${new Date().getMonth()}`);
        monthYears.forEach(my => {
            const [y, m] = my.split('/').map(Number);
            container.innerHTML += `<div class="cal-month-header">${y} 年 ${m + 1} 月</div>`;
            const grid = document.createElement('div'); grid.className = 'cal-grid';
            ["日","一","二","三","四","五","六"].forEach(w => grid.innerHTML += `<div class="cal-day cal-header">${w}</div>`);
            const first = new Date(y, m, 1).getDay();
            const total = new Date(y, m + 1, 0).getDate();
            for(let i=0; i<first; i++) grid.innerHTML += `<div class="cal-day" style="background:#f9f9f9"></div>`;
            for(let d=1; d<=total; d++) {
                const s = calculateDayScore(`${y}/${m+1}/${d}`);
                grid.innerHTML += `<div class="cal-day"><div style="font-weight:bold">${d}</div>${s.hasData?`<div class="cal-dot" style="background:${s.color}"></div><div class="cal-note">${s.score===3?'做得好!':s.reasons.join('<br>')}</div>`:''}</div>`;
            }
            container.appendChild(grid);
        });
    }

    function renderHistoryTable() {
        const logs = [...JSON.parse(localStorage.getItem('f_logs')||'[]'), ...JSON.parse(localStorage.getItem('d_logs')||'[]'), ...JSON.parse(localStorage.getItem('m_list')||'[]')];
        const dates = [...new Set(logs.map(x=>normalizeDate(x.date)))].sort((a,b) => new Date(b) - new Date(a));
        document.getElementById('historyBody').innerHTML = dates.map(d => {
            const s = calculateDayScore(d);
            const safeId = d.replace(/\//g, '-');
            return `<tr><td>${d}<br><button class="view-btn" onclick="const e=document.getElementById('det-${safeId}'); e.style.display=e.style.display==='block'?'none':'block';">查看詳情</button></td>
                <td>${s.mOk?'✅':'❌'}</td><td>${s.fOk?'✅':'❌'}</td><td>${s.dOk?'✅':'❌'}</td></tr>
            <tr><td colspan="4"><div id="det-${safeId}" style="display:none; font-size:0.8rem; text-align:left; background:#f9f9f9; padding:10px;">藥物: ${s.m.map(x=>x.timeSlot).join(', ') || '無'}<br>飲水: ${s.fSum}mL<br>飲食: ${s.d.map(x=>x.name).join(', ')}</div></td></tr>`;
        }).join('');
    }

    document.getElementById('pinInput').addEventListener('input', (e) => {
        if (e.target.value === CONFIG.PIN) {
            document.getElementById('pinOverlay').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            updateUI(); 
            const y = new Date(); y.setDate(y.getDate()-1);
            const s = calculateDayScore(y.toLocaleDateString());
            const div = document.getElementById('yesterdaySummary');
            if(!s.hasData) div.innerHTML = "今天是新的一天！💪";
            else if(s.score === 3) div.innerHTML = "🌟 昨天你做得很好，在三個範疇都成功拿到了 ✅！今天你都可以做得到的。";
            else div.innerHTML = `昨天你沒有拿到所有的 ✅！注意：${s.reasons.join('、')}。繼續加油！💪`;
            
            // Auto-start check if already granted
            if (Notification.permission === "granted") startReminderCheck();
        }
    });

    function exportToPDF() { window.print(); }
</script>
</body>
</html>
