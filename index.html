<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的健康日誌</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f4f7f9; padding: 15px; margin: 0; color: #2c3e50; }
        .card { background: white; border-radius: 15px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        h2 { border-bottom: 2px solid #3498db; padding-bottom: 5px; margin-top: 0; font-size: 1.1rem; }
        .welcome-msg { color: #3498db; font-weight: bold; margin-bottom: 5px; font-size: 1.1rem; text-align: center; }
        .summary-msg { background: #e3f2fd; padding: 12px; border-radius: 10px; font-size: 0.95rem; margin-bottom: 20px; border-left: 4px solid #2196f3; color: #0d47a1; }
        .location-section { background: #fff; border: 2px solid #3498db; border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        .tabs { display: flex; margin-bottom: 15px; border-radius: 10px; overflow: hidden; border: 1px solid #ddd; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: #eee; cursor: pointer; font-weight: bold; }
        .tab-btn.active { background: #3498db; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* Calendar UI */
        .calendar-legend { display: flex; flex-wrap: wrap; gap: 10px; font-size: 0.8rem; margin-bottom: 15px; }
        .legend-item { display: flex; align-items: center; gap: 5px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
        .cal-day { font-size: 0.7rem; padding: 5px; border-radius: 5px; background: #fff; border: 1px solid #eee; min-height: 50px; display: flex; flex-direction: column; align-items: center; }
        .cal-dot { width: 20px; height: 20px; border-radius: 50%; margin: 4px 0; }
        .cal-note { font-size: 0.6rem; color: #e74c3c; line-height: 1; }

        /* History Details */
        .details-box { display: none; background: #f9f9f9; padding: 10px; border-radius: 8px; margin-top: 5px; font-size: 0.8rem; text-align: left; border: 1px solid #ddd; }
        .clickable-row { cursor: pointer; }
        .clickable-row:hover { background: #f0f7ff; }

        /* Progress Bar */
        .progress-container { background: #eee; border-radius: 20px; height: 20px; width: 100%; margin: 10px 0; overflow: hidden; }
        #progressBar { background: #3498db; height: 100%; width: 0%; transition: width 0.5s ease; }
        .limit-reached { background-color: #e74c3c !important; }
        
        input, select { padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
        button { background: #3498db; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }
        .entry-item { border-bottom: 1px solid #eee; padding: 10px 0; font-size: 0.9rem; }
        .action-btns { display: flex; gap: 5px; margin-top: 5px; justify-content: flex-end; }
        .med-btn { background: #f8f9fa; color: #2c3e50; border: 2px solid #ddd; font-weight: normal; margin-bottom: 5px; }
        .med-btn.taken { background: #27ae60; color: white; border-color: #27ae60; }
        #pinOverlay { position: fixed; inset: 0; background: #2c3e50; display: flex; justify-content: center; align-items: center; z-index: 1000; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.85rem; text-align: center; }
        th, td { padding: 10px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<div id="pinOverlay">
    <div class="card" style="width: 280px; text-align: center;">
        <h3>我的健康日誌 - 解鎖 📝🔓</h3>
        <input type="password" id="pinInput" maxlength="4" placeholder="輸入 PIN" inputmode="numeric" style="text-align:center; font-size: 20px;">
    </div>
</div>

<div id="mainApp" style="display:none;">
    <div class="welcome-msg">歡迎登錄你的健康日誌！</div>
    <div id="yesterdaySummary" class="summary-msg">正在分析昨日進度...</div>

    <div class="location-section">
        <h2 style="border:none; margin-bottom:10px;">📍 我現在在哪裡？</h2>
        <select id="userLocation" onchange="toggleLocDetail()">
            <option value="屋企 (在客廳)">屋企 (在客廳)</option>
            <option value="屋企 (在床上)">屋企 (在床上)</option>
            <option value="街上/商場">街上/商場</option>
            <option value="醫院">醫院</option>
            <option value="其他">其他</option>
        </select>
        <input type="text" id="locDetail" placeholder="請註明地點細節..." style="display:none;">
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('tracker', this)">今日記錄</button>
        <button class="tab-btn" onclick="showTab('history', this)">歷史回顧</button>
    </div>

    <div id="tracker" class="tab-content active">
        <div class="card">
            <h2>🥗 自動飲食分析</h2>
            <input type="text" id="foodName" placeholder="輸入食物">
            <button onclick="addFood()" style="background:#f39c12;">紀錄並分析</button>
            <div id="dailyFoodList"></div>
        </div>

        <div class="card">
            <h2>💊 藥物狀態</h2>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <button id="btn8" class="med-btn" onclick="toggleMed('08:00', 'btn8')">08:00 AM</button>
                <button id="btn12" class="med-btn" onclick="toggleMed('12:00', 'btn12')">12:00 PM</button>
                <button id="btn20" class="med-btn" onclick="toggleMed('20:00', 'btn20')">08:00 PM</button>
                <button id="btn22" class="med-btn" onclick="toggleMed('22:00', 'btn22')">10:00 PM</button>
            </div>
        </div>

        <div class="card">
            <h2>💧 飲水進度 (<span id="curTotal">0</span>/800mL)</h2>
            <div class="progress-container"><div id="progressBar"></div></div>
            <div style="display:flex; gap:5px;">
                <input type="number" id="fluidAmt" placeholder="mL" style="width:150px;">
                <select id="fluidType" onchange="toggleFluidNote()">
                    <option value="水">水</option>
                    <option value="其他">其他</option>
                </select>
            </div>
            <input type="text" id="fluidNote" placeholder="備註" style="display:none;">
            <button onclick="addFluid()">新增記錄</button>
            <div id="dailyFluidList"></div>
        </div>
    </div>

    <div id="history" class="tab-content">
        <div class="card">
            <h2>📅 狀態月曆</h2>
            <div class="calendar-legend">
                <div class="legend-item"><span class="dot" style="background:green;"></span>3/3成功</div>
                <div class="legend-item"><span class="dot" style="background:darkorange;"></span>2/3成功</div>
                <div class="legend-item"><span class="dot" style="background:darkred;"></span>1/3成功</div>
                <div class="legend-item"><span class="dot" style="background:black;"></span>0/3成功</div>
            </div>
            <div class="cal-grid" id="calendarGrid"></div>
        </div>

        <div class="card">
            <h2>📋 每日詳情 (點擊日期查看)</h2>
            <table id="historyTable">
                <thead><tr><th>日期</th><th>藥物</th><th>飲水</th><th>飲食</th></tr></thead>
                <tbody id="historyBody"></tbody>
            </table>
            <button onclick="exportToPDF()" style="background:#2980b9; margin-top:20px;">生成詳細 PDF 報告</button>
        </div>
    </div>

    <button onclick="location.reload()" style="background:#34495e; margin:20px 0 40px;">登出</button>
</div>

<script>
    const CONFIG = { LIMIT: 800, PIN: "1234" };
    const HIGH_PHOS_KEYWORDS = ["牛奶", "乳酪", "起司", "豆", "蛋黃", "牛肉", "豬肉", "內臟", "巧克力", "可樂", "咖啡", "堅果", "罐頭"];
    const HIGH_PRO_KEYWORDS = ["雞肉", "魚", "肉", "蝦", "蟹", "海鮮"];

    // Basic UI Toggles
    function toggleLocDetail() { document.getElementById('locDetail').style.display = (document.getElementById('userLocation').value === '其他') ? 'block' : 'none'; }
    function toggleFluidNote() { document.getElementById('fluidNote').style.display = (document.getElementById('fluidType').value === '其他') ? 'block' : 'none'; }
    function getToday() { return new Date().toLocaleDateString(); }
    function getSelectedLocation() { 
        const loc = document.getElementById('userLocation').value;
        const det = document.getElementById('locDetail').value;
        return loc === '其他' && det ? `其他(${det})` : loc;
    }

    // Logic: Scoring a Day
    function calculateDayScore(dateStr) {
        const fLogs = JSON.parse(localStorage.getItem('f_logs') || '[]').filter(l => l.date === dateStr);
        const dLogs = JSON.parse(localStorage.getItem('d_logs') || '[]').filter(l => l.date === dateStr);
        const mLogs = JSON.parse(localStorage.getItem('m_list') || '[]').filter(l => l.date === dateStr);

        const fSum = fLogs.reduce((s, l) => s + l.amt, 0);
        const fOk = fSum >= 700 && fSum <= 800;
        const dOk = dLogs.length > 0 && !dLogs.some(l => l.risk);
        const mTaken = mLogs.map(l => l.timeSlot);
        const mOk = ["08:00", "12:00", "20:00", "22:00"].every(t => mTaken.includes(t));

        let score = 0;
        let reasons = [];
        if (mOk) score++; else reasons.push("藥物未齊");
        if (fOk) score++; else reasons.push("飲水標");
        if (dOk) score++; else reasons.push("飲食風險");

        let color = "black";
        if (score === 3) color = "green";
        else if (score === 2) color = "darkorange";
        else if (score === 1) color = "darkred";

        return { score, color, reasons, fLogs, dLogs, mLogs, fOk, dOk, mOk, fSum };
    }

    // PIN Login
    document.getElementById('pinInput').addEventListener('input', (e) => {
        if (e.target.value === CONFIG.PIN) {
            document.getElementById('pinOverlay').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            updateUI();
            generateYesterdaySummary();
        }
    });

    function generateYesterdaySummary() {
        const y = new Date(); y.setDate(y.getDate()-1);
        const s = calculateDayScore(y.toLocaleDateString());
        const div = document.getElementById('yesterdaySummary');
        if (s.score === 3) div.innerHTML = "🌟 昨天你做得很好，在三個範疇都成功拿到了 ✅！今天你都可以做得到的。";
        else {
            let feedback = "昨天你沒有拿到所有的 ✅！我們注意到：";
            if (!s.mOk) feedback += " 藥物紀錄不齊全 😥";
            if (s.dLogs.some(l=>l.risk)) feedback += " 飲食含高磷風險！ 🙅‍♀️";
            if (!s.fOk) feedback += ` 飲水量為 ${s.fSum}mL 😨`;
            feedback += " 今天我們重新開始，一起加油！💪";
            div.innerHTML = feedback;
        }
    }

    // CRUD Functions
    function addFluid() {
        const amt = parseInt(document.getElementById('fluidAmt').value);
        if (!amt) return;
        const entry = { id: Date.now(), date: getToday(), time: new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}), amt, label: document.getElementById('fluidType').value === '其他' ? `其他(${document.getElementById('fluidNote').value})` : '水', location: getSelectedLocation() };
        const logs = JSON.parse(localStorage.getItem('f_logs') || '[]');
        logs.unshift(entry); localStorage.setItem('f_logs', JSON.stringify(logs));
        document.getElementById('fluidAmt').value = ''; updateUI();
    }

    function addFood() {
        const name = document.getElementById('foodName').value; if(!name) return;
        const comment = getMedicalComment(name);
        const entry = { id: Date.now(), date: getToday(), time: new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}), name, comment, risk: comment.includes("⚠️") || comment.includes("⛔"), location: getSelectedLocation() };
        const logs = JSON.parse(localStorage.getItem('d_logs') || '[]');
        logs.unshift(entry); localStorage.setItem('d_logs', JSON.stringify(logs));
        document.getElementById('foodName').value = ''; updateUI();
    }

    function toggleMed(slot, btnId) {
        let logs = JSON.parse(localStorage.getItem('m_list') || '[]');
        const existing = logs.find(l => l.date === getToday() && l.timeSlot === slot);
        if (existing) { if(confirm("取消記錄？")) logs = logs.filter(l => l !== existing); }
        else { logs.unshift({ id: Date.now(), date: getToday(), time: new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}), timeSlot: slot, location: getSelectedLocation() }); }
        localStorage.setItem('m_list', JSON.stringify(logs)); updateUI();
    }

    function getMedicalComment(food) {
        let c = [];
        if (HIGH_PHOS_KEYWORDS.some(k => food.includes(k))) c.push("⚠️ 注意：此食物含磷較高。過多的磷會導致皮膚瘙癢和骨骼問題！");
        if (HIGH_PRO_KEYWORDS.some(k => food.includes(k))) c.push("ℹ️ 提醒：這是一種高蛋白質食物。請確保攝取量符合營養師的建議！");
        if (food.includes("加工") || food.includes("火腿") || food.includes("香腸")) c.push("⛔ 警告：加工食品含有極易被吸收的無機磷，請盡量避免。");
        return c.length > 0 ? c.join("<br>") : "✅ 良好的選擇，請繼續保持～";
    }

    function updateUI() {
        const s = calculateDayScore(getToday());
        document.getElementById('curTotal').innerText = s.fSum;
        const bar = document.getElementById('progressBar');
        bar.style.width = Math.min((s.fSum/800)*100, 100) + '%';
        bar.className = s.fSum > 800 ? 'limit-reached' : '';
        ["08:00", "12:00", "20:00", "22:00"].forEach((t, i) => {
            document.getElementsByClassName('med-btn')[i].className = s.mLogs.some(l=>l.timeSlot===t) ? "med-btn taken" : "med-btn";
        });
        const listHtml = (logs) => logs.map(l => `<div class="entry-item"><span>[${l.time}] ${l.name || l.label || l.timeSlot} (${l.amt?l.amt+'mL':''}) <small>@${l.location}</small></span></div>`).join('');
        document.getElementById('dailyFluidList').innerHTML = listHtml(s.fLogs);
        document.getElementById('dailyFoodList').innerHTML = listHtml(s.dLogs);
    }

    function showTab(id, btn) {
        document.querySelectorAll('.tab-content, .tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(id).classList.add('active'); btn.classList.add('active');
        if(id === 'history') { renderCalendar(); renderHistoryTable(); }
    }

    function renderCalendar() {
        const grid = document.getElementById('calendarGrid'); grid.innerHTML = '';
        for(let i=13; i>=0; i--) {
            const d = new Date(); d.setDate(d.getDate()-i);
            const dStr = d.toLocaleDateString();
            const s = calculateDayScore(dStr);
            grid.innerHTML += `<div class="cal-day">
                <div>${d.getDate()}</div>
                <div class="cal-dot" style="background:${s.color}"></div>
                <div class="cal-note">${s.score < 3 ? s.reasons[0]||'' : ''}</div>
            </div>`;
        }
    }

    function renderHistoryTable() {
        const f = JSON.parse(localStorage.getItem('f_logs')||'[]');
        const d = JSON.parse(localStorage.getItem('d_logs')||'[]');
        const m = JSON.parse(localStorage.getItem('m_list')||'[]');
        const dates = [...new Set([...f.map(x=>x.date), ...d.map(x=>x.date), ...m.map(x=>x.date)])].sort().reverse();
        
        document.getElementById('historyBody').innerHTML = dates.map(date => {
            const s = calculateDayScore(date);
            return `<tr class="clickable-row" onclick="toggleDetails('${date}')">
                <td>${date}</td>
                <td>${s.mOk?'✅':'❌'}</td><td>${s.fOk?'✅':'❌'}</td><td>${s.dOk?'✅':'❌'}</td>
            </tr>
            <tr><td colspan="4"><div id="details-${date}" class="details-box">
                <strong>藥物:</strong> ${s.mLogs.map(x=>x.timeSlot).join(', ') || '無'}<br>
                <strong>飲水:</strong> ${s.fSum}mL<br>
                <strong>飲食:</strong> ${s.dLogs.map(x=>x.name).join(', ') || '無'}
            </div></td></tr>`;
        }).join('');
    }

    function toggleDetails(date) {
        const el = document.getElementById(`details-${date}`);
        el.style.display = el.style.display === 'block' ? 'none' : 'block';
    }

    function exportToPDF() {
        const f = JSON.parse(localStorage.getItem('f_logs')||'[]');
        const dates = [...new Set(f.map(x=>x.date))].sort();
        const range = dates.length > 0 ? `${dates[0]} 至 ${dates[dates.length-1]}` : getToday();
        
        const win = window.open('', '', 'height=700,width=900');
        win.document.write(`<html><head><title>報告</title><style>
            body { font-family: sans-serif; padding: 30px; }
            .section { margin-bottom: 30px; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
            table { width: 100%; border-collapse: collapse; margin-top: 10px; }
            th, td { border: 1px solid #ddd; padding: 10px; text-align: left; font-size: 0.9rem; }
            .pass { color: green; } .fail { color: red; }
        </style></head><body>
            <h1>腎臟健康每週進度報告</h1>
            <p><strong>報告期間:</strong> ${range}</p>
            <div class="section"><h2>1. 每日指標摘要</h2>${document.getElementById('historyTable').outerHTML}</div>
            <div class="section"><h2>2. 詳細記錄明細</h2>`);
        
        const allDates = [...new Set(f.map(x=>x.date))].sort().reverse();
        allDates.forEach(d => {
            const s = calculateDayScore(d);
            win.document.write(`<h3>日期: ${d}</h3>
                <p>藥物: ${s.mLogs.map(x=>`[${x.time}] ${x.timeSlot}`).join(', ')}</p>
                <p>飲水: ${s.fLogs.map(x=>`[${x.time}] ${x.amt}mL (${x.label})`).join(', ')}</p>
                <p>飲食: ${s.dLogs.map(x=>`[${x.time}] ${x.name} - ${x.comment}`).join('<br>')}</p><hr>`);
        });
        
        win.document.write(`</div></body></html>`);
        win.document.close(); win.print();
    }
</script>
</body>
</html>
